<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --info-color: #36b9cc;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
        }

        body {
            background-color: #f8f9fc;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #4e73df 10%, #224abe 100%);
            width: 250px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 1rem 1.5rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .sidebar .nav-link:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .sidebar .nav-link i {
            margin-right: 0.5rem;
        }

        .brand-text {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1.5rem;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .main-content {
            margin-left: 250px;
            padding: 2rem;
        }

        .card {
            border: none;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-radius: 0.5rem;
        }

        .card-header {
            background-color: #f8f9fc;
            border-bottom: 1px solid #e3e6f0;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-card {
            border-left: 4px solid;
            padding: 1.5rem;
        }

        .stat-card.primary { border-color: var(--primary-color); }
        .stat-card.success { border-color: var(--success-color); }
        .stat-card.info { border-color: var(--info-color); }
        .stat-card.warning { border-color: var(--warning-color); }

        .stat-card h3 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #5a5c69;
        }

        .stat-card p {
            color: var(--secondary-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin: 0;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: #2e59d9;
            border-color: #2e59d9;
        }

        .table th {
            font-weight: 600;
            color: #5a5c69;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .badge-present { background-color: var(--success-color); }
        .badge-absent { background-color: var(--danger-color); }
        .badge-late { background-color: var(--warning-color); }

        .page-header {
            margin-bottom: 1.5rem;
        }

        .page-header h1 {
            color: #5a5c69;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                min-height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="{% url 'dashboard' %}" class="brand-text">
            <i class="bi bi-mortarboard-fill"></i> SMS Portal
        </a>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'student' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'student_list' %}">
                    <i class="bi bi-people"></i> Students
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'course' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'course_list' %}">
                    <i class="bi bi-book"></i> Courses
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'attendance' in request.resolver_match.url_name and not 'session' in request.resolver_match.url_name and request.resolver_match.url_name != 'mark_attendance_code' %}active{% endif %}" href="{% url 'attendance_list' %}">
                    <i class="bi bi-calendar-check"></i> Attendance
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'attendance_session' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'attendance_session_list' %}">
                    <i class="bi bi-qr-code"></i> Attendance Codes
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'mark_attendance_code' %}active{% endif %}" href="{% url 'mark_attendance_code' %}">
                    <i class="bi bi-pencil-square"></i> Enter Code
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'grade' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'grade_list' %}">
                    <i class="bi bi-award"></i> Grades
                </a>
            </li>
        </ul>
    </nav>

    <div class="main-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
