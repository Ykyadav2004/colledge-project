{% if students %}
<div class="table-responsive">
    <table class="table">
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Present</th>
                <th>Absent</th>
                <th>Late</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.roll_number }}</td>
                <td>{{ student.full_name }}</td>
                <td>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status_{{ student.id }}" value="P" checked>
                    </div>
                </td>
                <td>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status_{{ student.id }}" value="A">
                    </div>
                </td>
                <td>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status_{{ student.id }}" value="L">
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div class="mt-3">
    <button type="button" class="btn btn-sm btn-outline-success" onclick="markAll('P')">
        <i class="bi bi-check-all"></i> Mark All Present
    </button>
    <button type="button" class="btn btn-sm btn-outline-danger" onclick="markAll('A')">
        <i class="bi bi-x-circle"></i> Mark All Absent
    </button>
</div>
<script>
function markAll(status) {
    document.querySelectorAll('input[type="radio"][value="' + status + '"]').forEach(function(radio) {
        radio.checked = true;
    });
}
</script>
{% else %}
<div class="alert alert-warning">
    <i class="bi bi-exclamation-triangle"></i> No students enrolled in this course.
</div>
{% endif %}
